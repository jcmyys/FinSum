<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>주식 데이터 통합 뷰 (기준가격 저장)</title>
  <style>
    table {
      border-collapse: collapse;
      width: 90%;
      margin-top: 20px;
      text-align: center;
      margin-bottom: 40px;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 6px;
    }
    th {
      background-color: #f4f4f4;
    }
    .highest {
      color: red;
      font-weight: bold;
    }
    /* 저점 대비 상승률 행 스타일 (파랑) */
    .summary-row {
      background-color: #e8f4ff;
      font-weight: bold;
      color: #0056b3;
    }
    /* 고점 대비 하락률 행 스타일 (연한 빨강) */
    .drop-row {
      background-color: #ffe8e8;
      font-weight: bold;
      color: #d32f2f;
    }
    input[type="number"] {
      width: 80px;
      text-align: right;
    }
    .price-label {
      margin-left: 5px;
      color: blue;
      font-weight: bold;
    }
    button {
      margin-top: 20px;
      padding: 8px 15px;
      font-size: 16px;
      cursor: pointer;
      margin-right: 10px;
    }
    .ratio-box {
      margin-top: 20px;
      font-size: 16px;
      padding: 10px;
      background: #f5f5f5;
      border-radius: 8px;
      width: 380px;
    }
    
    #transaction-button {
      background-color: #ffcccc; 
      border: 1px solid #ff9999;
      transition: background-color 0.3s;
    }
    #transaction-button:hover {
      background-color: #ff9999;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <h3>주식 6종목 최근 25거래일 종가 (최고가 빨간색 표시)</h3>
  
  <div>
    <button id="load-button">데이터 불러오기</button>
    <button id="transaction-button">매매기록</button>
  </div>

  <table id="stock-table">
    <thead>
      <tr>
        <th>날짜</th>
        <th>AAPL</th>
        <th>SPLG</th>
        <th>MSFT</th>
        <th>GOOGL</th>
        <th>AMD</th>
        <th>UEC</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <h3>기준가격 및 가격 레벨 비교표</h3>
  <table id="price-table">
    <thead>
      <tr id="symbols-row"></tr>
      <tr id="base-price-row"></tr>
    </thead>
    <tbody id="price-level-rows"></tbody>
  </table>

  <script>
    const apiKey = 'UAN4E6AQL39DPU6H';
    const symbols = ['AAPL', 'SPLG', 'MSFT', 'GOOGL', 'AMD', 'UEC'];
    
    const daysToShow = 25; 
    
    const decrementRate = 0.025;
    const decrementRows = 15;
    const STORAGE_KEY = 'stockBasePrices';

    let basePrices = {
      'AAPL': 256.87,
      'SPLG': 78.68,
      'MSFT': 514.45,
      'GOOGL': 125.30,
      'AMD': 161.27,
      'UEC': 13.50
    };

    function loadBasePrices() {
      const stored = localStorage.getItem(STORAGE_KEY);
      if (stored) {
        try {
          const parsed = JSON.parse(stored);
          symbols.forEach(sym => {
            if (parsed[sym] && !isNaN(parsed[sym])) basePrices[sym] = parsed[sym];
          });
        } catch (e) {
          console.warn('기준가격 로컬스토리지 파싱 오류:', e);
        }
      }
    }

    function saveBasePrices() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(basePrices));
    }

    let allStockData = null;
    let latestClosePrices = {};

    function renderStockTable() {
      const tbody = document.querySelector('#stock-table tbody');
      tbody.innerHTML = '';
      if (!allStockData) return;

      const highestPrices = {};
      const lowestPrices = {}; 

      symbols.forEach(sym => {
        const prices = Object.values(allStockData[sym]);
        highestPrices[sym] = Math.max(...prices);
        lowestPrices[sym] = Math.min(...prices); 
        
        const dates = Object.keys(allStockData[sym]).sort((a, b) => b.localeCompare(a));
        latestClosePrices[sym] = allStockData[sym][dates[0]];
      });

      const datesSet = new Set();
      symbols.forEach(sym => {
        Object.keys(allStockData[sym]).forEach(date => datesSet.add(date));
      });
      const dates = Array.from(datesSet).sort((a, b) => b.localeCompare(a)).slice(0, daysToShow);

      // 1. 날짜별 데이터 렌더링
      dates.forEach(date => {
        const tr = document.createElement('tr');
        let rowHtml = `<td>${date}</td>`;
        symbols.forEach(sym => {
          const price = allStockData[sym][date];
          if (price !== undefined) {
            rowHtml += price === highestPrices[sym]
              ? `<td class="highest">${price.toFixed(2)}</td>`
              : `<td>${price.toFixed(2)}</td>`;
          } else {
            rowHtml += '<td>-</td>';
          }
        });
        tr.innerHTML = rowHtml;
        tbody.appendChild(tr);
      });

      // 2. 저점 대비 상승률 행
      const summaryTr = document.createElement('tr');
      summaryTr.className = 'summary-row'; 
      let summaryHtml = '<td>저점 대비 상승</td>';

      symbols.forEach(sym => {
        const currentPrice = latestClosePrices[sym];
        const lowPrice = lowestPrices[sym];

        if (currentPrice !== undefined && lowPrice !== undefined && lowPrice !== 0) {
          const growthRate = ((currentPrice - lowPrice) / lowPrice) * 100;
          summaryHtml += `<td>+${growthRate.toFixed(2)}%</td>`;
        } else {
          summaryHtml += '<td>-</td>';
        }
      });

      summaryTr.innerHTML = summaryHtml;
      tbody.appendChild(summaryTr);

      // 3. 고점 대비 하락률 행
      const dropTr = document.createElement('tr');
      dropTr.className = 'drop-row'; 
      let dropHtml = '<td>고점 대비 하락</td>';

      symbols.forEach(sym => {
        const currentPrice = latestClosePrices[sym];
        const highPrice = highestPrices[sym]; 

        if (currentPrice !== undefined && highPrice !== undefined && highPrice !== 0) {
          const dropRate = ((currentPrice - highPrice) / highPrice) * 100;
          dropHtml += `<td>${dropRate.toFixed(2)}%</td>`;
        } else {
          dropHtml += '<td>-</td>';
        }
      });

      dropTr.innerHTML = dropHtml;
      tbody.appendChild(dropTr);
    }

    function renderBasePriceTableHeader() {
      const symbolsRow = document.getElementById('symbols-row');
      const basePriceRow = document.getElementById('base-price-row');
      symbolsRow.innerHTML = '<th></th>';
      basePriceRow.innerHTML = '<td>기준가격</td>';

      symbols.forEach(sym => {
        const th = document.createElement('th');
        th.textContent = sym;
        symbolsRow.appendChild(th);

        const td = document.createElement('td');
        const input = document.createElement('input');
        input.type = 'number';
        input.step = '0.01';
        input.value = basePrices[sym];
        input.id = `input-${sym}`;
        input.addEventListener('change', () => {
          const val = parseFloat(input.value);
          if (!isNaN(val)) {
            basePrices[sym] = val;
            saveBasePrices();
            renderPriceLevelsTable();
          }
        });
        td.appendChild(input);
        basePriceRow.appendChild(td);
      });
    }

    function renderPriceLevelsTable() {
      const tbody = document.getElementById('price-level-rows');
      tbody.innerHTML = '';

      for (let i = 0; i < decrementRows; i++) {
        const tr = document.createElement('tr');
        const labelTd = document.createElement('td');
        labelTd.textContent = (100 - decrementRate * i * 100).toFixed(2) + '% 기준가';
        tr.appendChild(labelTd);

        symbols.forEach(sym => {
          const td = document.createElement('td');
          const levelPrice = basePrices[sym] * (1 - decrementRate * i);
          td.textContent = levelPrice.toFixed(2);
          const closePrice = latestClosePrices[sym];
          if (closePrice !== undefined && closePrice < levelPrice) {
            const span = document.createElement('span');
            span.className = 'price-label';
            span.textContent = closePrice.toFixed(2);
            td.appendChild(span);
          }
          tr.appendChild(td);
        });

        tbody.appendChild(tr);
      }
    }

    async function fetchSymbolData(symbol) {
      // range=3mo: 25거래일 데이터를 충분히 확보하기 위해 최근 3달치 요청
      const url = `https://corsproxy.io/?https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d&range=3mo`;
      
      const response = await fetch(url);
      const data = await response.json();
      
      if (!data.chart || !data.chart.result || data.chart.result.length === 0) {
        throw new Error(`${symbol} 데이터 없음`);
      }

      const result = data.chart.result[0];
      const timestamps = result.timestamp;
      const quotes = result.indicators.quote[0];
      
      // 데이터 포맷을 기존 로직(날짜: 가격)에 맞게 변환
      const closePrices = {};
      timestamps.forEach((ts, index) => {
        // 종가 데이터가 있는 경우에만 처리 (장 휴무일 등 제외)
        if (quotes.close[index] !== null) {
          // Unix Timestamp를 YYYY-MM-DD 형식으로 변환
          const date = new Date(ts * 1000).toISOString().split('T')[0];
          closePrices[date] = parseFloat(quotes.close[index]);
        }
      });

      return closePrices;
    }

    async function fetchAllStockData() {
      const allData = {};
      for (const sym of symbols) {
        try {
          allData[sym] = await fetchSymbolData(sym);
        } catch (e) {
          console.error(e);
          alert(`${sym} 주가 데이터 불러오기 실패`);
          allData[sym] = {};
        }
      }
      allStockData = allData;
    }

    async function onLoadButtonClick() {
      const btn = document.getElementById('load-button');
      btn.disabled = true;
      btn.textContent = '불러오는 중...';
      
      await fetchAllStockData();
      renderStockTable();  
      
      let pricesUpdated = false;
      symbols.forEach(sym => {
        const latestPrice = latestClosePrices[sym];
        if (latestPrice && latestPrice > basePrices[sym]) {  
          console.log(`${sym}: 기준가격 업데이트 ${basePrices[sym]} → ${latestPrice}`);
          basePrices[sym] = latestPrice;
          document.getElementById(`input-${sym}`).value = latestPrice;
          pricesUpdated = true;
        }
      });
      
      if (pricesUpdated) {
        saveBasePrices();
      }

      renderPriceLevelsTable();
      btn.disabled = false;
      btn.textContent = '데이터 불러오기';
    }

    function goToTransactionPage() {
      if (Object.keys(latestClosePrices).length === 0) {
          alert("주가 정보가 없습니다. 먼저 '데이터 불러오기'를 실행해주세요.");
          return;
      }
      localStorage.setItem('latestPrices', JSON.stringify(latestClosePrices));
      // 수정됨: 전체 URL로 변경 및 확장자 .php 적용
      window.location.href = 'https://jcmyys.infinityfree.me/AssetDonut2/transaction.php';
    }

    function init() {
      loadBasePrices();
      renderBasePriceTableHeader();
    }

    document.getElementById('load-button').addEventListener('click', onLoadButtonClick);
    document.getElementById('transaction-button').addEventListener('click', goToTransactionPage);
    init();
  </script>

  <h3>미국 시가총액 1~4위 한달간 변화</h3>
  <div id="desc"></div>
  <canvas id="marketCapChart" width="720" height="340"></canvas>
  <div class="ratio-box" id="ratios"></div>
  <script>
    const symbols2 = ['NVDA', 'MSFT', 'AAPL', 'GOOGL'];
    const names = ['NVIDIA', 'Microsoft', 'Apple', 'Alphabet'];
    const shares = {
      'NVDA': 24300000000,
      'MSFT': 7430000000,
      'AAPL': 14860000000,
      'GOOGL': 12038760000 
    };
    const dtEnd = Math.floor(Date.now()/1000);
    const dtStart = dtEnd - (60*60*24*30);

    async function fetchHistory(symbol) {
      const url = `https://corsproxy.io/?https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?period1=${dtStart}&period2=${dtEnd}&interval=1d`;
      const r = await fetch(url);
      const j = await r.json();
      const timestamps = j.chart.result[0].timestamp;
      const closes = j.chart.result[0].indicators.adjclose[0].adjclose;
      const dates = timestamps.map(ts => new Date(ts * 1000).toISOString().slice(0,10));
      const marketCaps = closes.map(close => +(close * shares[symbol] / 1e12).toFixed(2));
      return {dates, marketCaps};
    }

    async function main() {
      const res = await Promise.all(symbols2.map(fetchHistory));
      const labels = res[0].dates;
      const s1 = res[0].marketCaps, 
            s2 = res[1].marketCaps, 
            s3 = res[2].marketCaps,
            s4 = res[3].marketCaps;
      const n = labels.length - 1;
      const latestCaps = [
          {name: names[0], cap: s1[n]},
          {name: names[1], cap: s2[n]},
          {name: names[2], cap: s3[n]},
          {name: names[3], cap: s4[n]}
      ].sort((a,b)=>b.cap-a.cap);

      new Chart(document.getElementById('marketCapChart'), {
          type: 'line',
          data: {
              labels: labels,
              datasets: [
                  { label: names[0], data: s1, borderColor: 'rgb(60,180,75)', fill: false, tension: 0.25 },
                  { label: names[1], data: s2, borderColor: 'rgb(0,130,200)', fill: false, tension: 0.25 },
                  { label: names[2], data: s3, borderColor: 'rgb(245,130,48)', fill: false, tension: 0.25 },
                  { label: names[3], data: s4, borderColor: 'rgb(145,30,180)', fill: false, tension: 0.25 }
              ]
          },
          options: {
              responsive: false,
              plugins: { legend: { position: 'top' } },
              scales: {
                  y: { title: { display: true, text: '시가총액 (Trillion USD)' } },
                  x: { title: { display: true, text: '날짜' } }
              }
          }
      });

      document.getElementById('desc').innerHTML =
          `${labels[0]} ~ ${labels[n]} 기준 데이터 (단위: Trillion USD)`;

      document.getElementById('ratios').innerHTML = `
          <strong>실시간 시총 기준</strong><br>
          1등: ${latestCaps[0].name} (${latestCaps[0].cap}조)<br>
          2등: ${latestCaps[1].name} (${latestCaps[1].cap}조)<br>
          3등: ${latestCaps[2].name} (${latestCaps[2].cap}조)<br>
          4등: ${latestCaps[3].name} (${latestCaps[3].cap}조)<br><br>
          ${latestCaps[0].name} / ${latestCaps[1].name} = <b>${(latestCaps[0].cap / latestCaps[1].cap).toFixed(2)}</b><br>
          ${latestCaps[1].name} / ${latestCaps[2].name} = <b>${(latestCaps[1].cap / latestCaps[2].cap).toFixed(2)}</b><br>
          ${latestCaps[2].name} / ${latestCaps[3].name} = <b>${(latestCaps[2].cap / latestCaps[3].cap).toFixed(2)}</b>
      `;
    }
    main();
  </script>
</body>
</html>
